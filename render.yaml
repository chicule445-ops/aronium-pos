services:
  # Backend Web Service
  - type: web
    name: aronium-backend
    env: node
    plan: free
    buildCommand: cd backend && npm install && npm run build
    startCommand: cd backend && npm start
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production

  # Frontend Static Site
  - type: static
    name: aronium-frontend
    env: static
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    publishPath: frontend/dist
    routes:
      # This is the critical part to fix the "Not Found" error for SPA routing
      - type: rewrite
        source: /*
        destination: /index.html
